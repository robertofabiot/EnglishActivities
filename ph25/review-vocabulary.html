<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Review</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .flashcard-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .word-title {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            color: #2c3e50;
            text-transform: capitalize;
        }
        .svg-container {
            height: 180px;
            display: none;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .svg-container svg {
            width: 150px;
            height: 150px;
        }
        .definition-box {
            min-height: 90px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .definition-text {
            font-size: 1.1rem;
            color: #555;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin: 5px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-reveal {
            background-color: #e67e22;
            font-weight: bold;
            width: 100%;
            margin: 0 0 20px 0;
        }
        .btn-reveal:hover {
            background-color: #d35400;
        }
        .controls {
            display: flex;
            justify-content: space-between;
        }
        .counter {
            font-size: 0.9rem;
            color: #95a5a6;
            margin-bottom: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="flashcard-container">
    <div class="counter" id="cardCounter">1 / 66</div>
    <h1 class="word-title" id="wordDisplay">Word</h1>
    
    <div class="svg-container" id="svgDisplay">
        </div>

    <div class="definition-box">
        <p class="definition-text" id="definitionDisplay"></p>
    </div>

    <button class="btn btn-reveal" id="revealBtn" onclick="toggleDefinition()">Show Meaning</button>

    <div class="controls">
        <button class="btn" id="prevBtn" onclick="prevWord()">&#8592; Previous</button>
        <button class="btn" id="nextBtn" onclick="nextWord()">Next &#8594;</button>
    </div>
</div>

        { word: "Speed of light", definition: "299,792,458 meters per second (or 186,000 miles per second).", svg: `<svg viewBox="0 0 100 100"><circle cx="20" cy="50" r="8" stroke="#2c3e50" stroke-width="3" fill="none"/><path d="M20,58 L20,85 M5,70 L20,65 L35,65 M10,95 L20,85 L30,95" stroke="#2c3e50" stroke-width="3" fill="none"/><rect x="35" y="60" width="15" height="10" fill="#7f8c8d"/><polygon points="50,60 95,30 95,90" fill="#f1c40f" opacity="0.5"/><path d="M60,45 L80,45 M65,65 L85,65 M60,85 L80,85" stroke="#f39c12" stroke-width="2" stroke-dasharray="4 4"/><text x="70" y="60" font-size="20" font-style="italic" font-weight="bold" fill="#d35400">c</text></svg>` },
        { word: "Light-year", definition: "The distance that light travels in a year through a vacuum (6 trillion miles).", svg: `<svg viewBox="0 0 100 100"><circle cx="20" cy="50" r="15" fill="#3498db"/><path d="M10,50 Q20,60 30,50" stroke="#2ecc71" stroke-width="4" fill="none"/><polygon points="85,35 90,45 100,45 92,52 95,62 85,55 75,62 78,52 70,45 80,45" fill="#f1c40f"/><path d="M35,50 L70,50" stroke="#bdc3c7" stroke-width="3" stroke-dasharray="5 5"/><text x="40" y="40" font-size="10" font-family="sans-serif" fill="#2c3e50">1 YEAR</text></svg>` },
        { word: "To diminish (v2)", definition: "To lessen, reduce, or become limited.", svg: `<svg viewBox="0 0 100 100"><rect x="20" y="30" width="15" height="60" fill="#e74c3c"/><rect x="45" y="50" width="15" height="40" fill="#e67e22"/><rect x="70" y="70" width="15" height="20" fill="#f1c40f"/><path d="M25,25 L75,65" stroke="#2c3e50" stroke-width="3" marker-end="url(#arrow)"/><polygon points="75,65 65,65 75,55" fill="#2c3e50"/></svg>` },
        { word: "Longevity", definition: "The length of life.", svg: `<svg viewBox="0 0 100 100"><path d="M10,80 L90,80" stroke="#bdc3c7" stroke-width="3"/><circle cx="20" cy="75" r="4" fill="#2c3e50"/><circle cx="50" cy="50" r="6" stroke="#2c3e50" stroke-width="2" fill="none"/><path d="M50,56 L50,70 M40,65 L50,60 L60,65 M45,80 L50,70 L55,80" stroke="#2c3e50" stroke-width="2" fill="none"/><circle cx="80" cy="45" r="6" stroke="#7f8c8d" stroke-width="2" fill="none"/><path d="M80,51 L80,65 M70,60 L80,55 L85,65 M75,80 L80,65 L85,80" stroke="#7f8c8d" stroke-width="2" fill="none"/><path d="M85,65 L85,80" stroke="#d35400" stroke-width="2"/></svg>` },
        { word: "Genetics", definition: "The passing of physical characteristics from parents to children.", svg: `<svg viewBox="0 0 100 100"><circle cx="30" cy="30" r="6" stroke="#3498db" stroke-width="2" fill="none"/><path d="M30,36 L30,55 M20,45 L30,40 L40,45 M25,70 L30,55 L35,70" stroke="#3498db" stroke-width="2" fill="none"/><circle cx="70" cy="30" r="6" stroke="#e74c3c" stroke-width="2" fill="none"/><path d="M70,36 L70,55 M60,45 L70,40 L80,45 M65,70 L70,55 L75,70" stroke="#e74c3c" stroke-width="2" fill="none"/><circle cx="50" cy="65" r="4" stroke="#9b59b6" stroke-width="2" fill="none"/><path d="M50,69 L50,85 M45,75 L50,72 L55,75 M47,95 L50,85 L53,95" stroke="#9b59b6" stroke-width="2" fill="none"/><path d="M45,20 Q55,40 45,60 T45,100" fill="none" stroke="#bdc3c7" stroke-width="2" opacity="0.5"/><path d="M55,20 Q45,40 55,60 T55,100" fill="none" stroke="#bdc3c7" stroke-width="2" opacity="0.5"/></svg>` },
        { word: "Chronic", definition: "Long lasting, persistent.", svg: `<svg viewBox="0 0 100 100"><circle cx="30" cy="50" r="8" stroke="#2c3e50" stroke-width="3" fill="none"/><path d="M30,58 L30,85 M15,70 L30,65 L40,75 M20,95 L30,85 L40,95" stroke="#2c3e50" stroke-width="3" fill="none"/><circle cx="70" cy="40" r="20" fill="none" stroke="#7f8c8d" stroke-width="3"/><path d="M70,25 L70,40 L80,40" stroke="#7f8c8d" stroke-width="3"/><path d="M25,45 L35,55 M25,55 L35,45" stroke="#e74c3c" stroke-width="2"/><path d="M50,70 Q60,90 80,80 T90,50" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3 3"/></svg>` },
        { word: "Front", definition: "The area where two enemy forces meet in battle.", svg: `<svg viewBox="0 0 100 100"><circle cx="20" cy="50" r="8" stroke="#2980b9" stroke-width="3" fill="none"/><path d="M20,58 L20,85 M5,70 L20,65 L35,65 M10,95 L20,85 L30,95" stroke="#2980b9" stroke-width="3" fill="none"/><circle cx="80" cy="50" r="8" stroke="#c0392b" stroke-width="3" fill="none"/><path d="M80,58 L80,85 M65,65 L80,65 L95,70 M70,95 L80,85 L90,95" stroke="#c0392b" stroke-width="3" fill="none"/><path d="M50,20 L45,40 L55,60 L45,80 L50,100" stroke="#7f8c8d" stroke-width="4" fill="none"/></svg>` }
    ];

    let currentIndex = 0;
    let isDefinitionVisible = false;

    const wordDisplay = document.getElementById('wordDisplay');
    const svgDisplay = document.getElementById('svgDisplay');
    const definitionDisplay = document.getElementById('definitionDisplay');
    const revealBtn = document.getElementById('revealBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const cardCounter = document.getElementById('cardCounter');

    function updateCard() {
        const currentItem = vocabList[currentIndex];
        wordDisplay.textContent = currentItem.word;
        svgDisplay.innerHTML = currentItem.svg;
        definitionDisplay.textContent = currentItem.definition;
        cardCounter.textContent = `${currentIndex + 1} / ${vocabList.length}`;
        
        // Resetear la visibilidad
        isDefinitionVisible = false;
        definitionDisplay.style.display = 'none';
        svgDisplay.style.display = 'none';
        revealBtn.textContent = 'Show Meaning';

        // Actualizar el estado de los botones
        prevBtn.disabled = currentIndex === 0;
        prevBtn.style.opacity = currentIndex === 0 ? '0.5' : '1';
        nextBtn.disabled = currentIndex === vocabList.length - 1;
        nextBtn.style.opacity = currentIndex === vocabList.length - 1 ? '0.5' : '1';
    }

    function toggleDefinition() {
        isDefinitionVisible = !isDefinitionVisible;
        if (isDefinitionVisible) {
            definitionDisplay.style.display = 'block';
            svgDisplay.style.display = 'flex';
            revealBtn.textContent = 'Hide Meaning';
        } else {
            definitionDisplay.style.display = 'none';
            svgDisplay.style.display = 'none';
            revealBtn.textContent = 'Show Meaning';
        }
    }

    function nextWord() {
        if (currentIndex < vocabList.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevWord() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    // Inicializar la primera tarjeta
    updateCard();
</script>
